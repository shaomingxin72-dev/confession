<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>常昊旻の爱心收集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0a0014;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
            user-select: none;
        }

        /* ===== 开始界面 ===== */
        #startScreen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            background: linear-gradient(180deg, #0a0014, #1a0028, #0a0014);
        }
        #startScreen.hide { display: none; }
        .title {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ff6b9d, #ffd166);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #c9a0dc; font-size: 1rem; margin-bottom: 40px; }
        .start-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff3d7f);
            border: none; color: #fff;
            padding: 16px 60px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 25px rgba(255, 107, 157, 0.5);
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 25px rgba(255, 107, 157, 0.5); }
            50% { box-shadow: 0 4px 40px rgba(255, 107, 157, 0.8); }
        }
        .how-to {
            margin-top: 40px;
            color: #8a7099;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.8;
        }
        .how-to span { color: #ff6b9d; }

        /* ===== HUD ===== */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 16px;
            z-index: 20;
            pointer-events: none;
        }
        #hud.show { display: flex; }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 4px; }
        .hud-label { font-size: 0.7rem; color: #8a7099; }
        .hud-value { font-size: 1.3rem; font-weight: bold; }
        .hud-score .hud-value { color: #ffd166; }
        .hud-combo .hud-value { color: #ff6b9d; }
        .hud-level .hud-value { color: #a78bfa; }
        .hud-lives .hud-value { color: #ff4444; }
        .hud-right { align-items: flex-end; }

        /* ===== 连击闪字 ===== */
        .combo-flash {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: bold;
            color: #ffd166;
            pointer-events: none; z-index: 25;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 209, 102, 0.8);
            white-space: nowrap;
        }
        .combo-flash.show {
            animation: comboPop 0.8s ease forwards;
        }
        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }

        /* ===== 游戏层 ===== */
        #gameLayer {
            position: fixed; inset: 0;
            display: none;
            z-index: 5;
        }
        #gameLayer.show { display: block; }

        /* ===== 掉落物 DOM ===== */
        .fall-item {
            position: absolute;
            font-size: 28px;
            line-height: 1;
            pointer-events: none;
            will-change: transform;
            transition: none;
        }
        .fall-item.star { font-size: 34px; filter: drop-shadow(0 0 6px rgba(255, 209, 102, 0.8)); }
        .fall-item.bomb { font-size: 30px; }

        /* ===== 篮子 ===== */
        #basket {
            position: absolute;
            width: 70px; height: 50px;
            pointer-events: none;
            will-change: transform;
            z-index: 10;
        }
        #basket .basket-body {
            position: absolute;
            bottom: 0; left: 5px; right: 5px;
            height: 36px;
            background: linear-gradient(180deg, #ff6b9d, #ff3d7f);
            border-radius: 4px 4px 10px 10px;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }
        #basket .basket-rim {
            position: absolute;
            top: 8px; left: 0; right: 0;
            height: 10px;
            background: #ffa8c5;
            border-radius: 5px;
        }
        #basket .basket-line {
            position: absolute;
            bottom: 4px; left: 5px; right: 5px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 2px 2px 8px 8px;
        }

        /* ===== combo 光环 ===== */
        #comboRing {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            pointer-events: none;
            z-index: 9;
            will-change: transform;
            transition: border-color 0.3s;
        }

        /* ===== 暂停 ===== */
        #pauseOverlay {
            position: fixed; inset: 0;
            background: rgba(10, 0, 20, 0.85);
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 50;
        }
        #pauseOverlay.show { display: flex; }
        #pauseOverlay h2 { font-size: 2rem; color: #ffa8c5; margin-bottom: 30px; }
        .pause-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 157, 0.3);
            color: #ff6b9d;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px;
        }

        /* ===== 结束界面 ===== */
        #endScreen {
            position: fixed; inset: 0;
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            background: rgba(10, 0, 20, 0.92);
        }
        #endScreen.show { display: flex; }
        #endScreen h1 { font-size: 2.5rem; margin-bottom: 10px; }
        #endScreen .final-score { font-size: 4rem; font-weight: bold; color: #ffd166; margin: 10px 0; }
        #endScreen .stats { color: #c9a0dc; font-size: 0.95rem; line-height: 2; text-align: center; margin: 20px 0; }
        #endScreen .stats span { color: #ff6b9d; font-weight: bold; }
        .restart-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff3d7f);
            border: none; color: #fff;
            padding: 16px 60px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 25px rgba(255, 107, 157, 0.5);
            margin-top: 10px;
        }

        /* ===== 粒子 ===== */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 30;
            font-size: 20px;
            animation: particleFly 1s ease-out forwards;
        }
        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
        }

        /* ===== 分数弹出 ===== */
        .score-pop {
            position: fixed;
            pointer-events: none;
            z-index: 30;
            font-size: 1.2rem;
            font-weight: bold;
            animation: scorePop 0.8s ease-out forwards;
        }
        @keyframes scorePop {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(0.7); }
        }

        /* ===== 暂停按钮 ===== */
        #pauseBtn {
            position: fixed; top: 12px; right: 12px;
            z-index: 30;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #pauseBtn.show { display: flex; }
    </style>
</head>
<body>

<!-- 开始界面 -->
<div id="startScreen">
    <div style="font-size:4rem; margin-bottom:16px;">💗</div>
    <div class="title">常昊旻の爱心收集</div>
    <div class="subtitle">接住爱心，躲开炸弹</div>
    <button class="start-btn" onclick="startGame()">开始游戏</button>
    <div class="how-to">
        <span>👆 手指划动</span> 控制篮子移动<br>
        接住 <span>💗💕✨🌸</span> 加分<br>
        躲开 <span>💣</span> 扣命<br>
        <span>⭐ 星星</span> = 高分<br>
        连续接住触发 <span>连击加成</span>
    </div>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hud-left">
        <div class="hud-score"><div class="hud-label">得分</div><div class="hud-value" id="scoreVal">0</div></div>
        <div class="hud-combo"><div class="hud-label">连击</div><div class="hud-value" id="comboVal">0</div></div>
    </div>
    <div class="hud-right">
        <div class="hud-level"><div class="hud-label">等级</div><div class="hud-value" id="levelVal">1</div></div>
        <div class="hud-lives"><div class="hud-label">生命</div><div class="hud-value" id="livesVal">❤️❤️❤️</div></div>
    </div>
</div>

<!-- 连击闪字 -->
<div class="combo-flash" id="comboFlash"></div>

<!-- 游戏层 -->
<div id="gameLayer">
    <div id="comboRing"></div>
    <div id="basket">
        <div class="basket-rim"></div>
        <div class="basket-body"></div>
        <div class="basket-line"></div>
    </div>
</div>

<!-- 暂停按钮 -->
<button id="pauseBtn" onclick="togglePause()">⏸</button>

<!-- 暂停界面 -->
<div id="pauseOverlay">
    <h2>暂停中</h2>
    <button class="pause-btn" onclick="togglePause()">继续游戏</button>
    <button class="pause-btn" onclick="quitGame()">退出游戏</button>
</div>

<!-- 结束界面 -->
<div id="endScreen">
    <h1 id="endTitle">游戏结束</h1>
    <div class="final-score" id="finalScore">0</div>
    <div class="stats" id="endStats"></div>
    <button class="restart-btn" onclick="restartGame()">再来一次</button>
    <button class="pause-btn" style="margin-top:12px;" onclick="quitGame()">返回首页</button>
</div>

<script>
// ===== 游戏状态 =====
const gameLayer = document.getElementById('gameLayer');
const basketEl = document.getElementById('basket');
const comboRingEl = document.getElementById('comboRing');
let W, H;
let animId = null;
let gameRunning = false;
let paused = false;

// 篮子
let basket = { x: 0, y: 0, w: 70, h: 50 };
// 掉落物
let items = [];
// DOM 元素池
let itemEls = [];
// 星星背景（用 canvas 画）
let bgCanvas, bgCtx;

// 状态
let score = 0;
let combo = 0;
let maxCombo = 0;
let lives = 3;
let level = 1;
let totalCaught = 0;
let totalMissed = 0;
let totalBombs = 0;
let spawnTimer = 0;
let levelTimer = 0;
let difficulty = 1;
let shakeAmount = 0;
let shakeX = 0, shakeY = 0;

// 掉落物类型
const ITEM_TYPES = [
    { emoji: '💗', points: 10, type: 'good', weight: 30, cls: '' },
    { emoji: '💕', points: 15, type: 'good', weight: 20, cls: '' },
    { emoji: '❤️', points: 10, type: 'good', weight: 20, cls: '' },
    { emoji: '💖', points: 20, type: 'good', weight: 10, cls: '' },
    { emoji: '✨', points: 25, type: 'good', weight: 8, cls: '' },
    { emoji: '⭐', points: 50, type: 'star', weight: 5, cls: 'star' },
    { emoji: '🌸', points: 15, type: 'good', weight: 15, cls: '' },
    { emoji: '💣', points: -1, type: 'bomb', weight: 20, cls: 'bomb' },
];

// ===== 工具函数 =====
function rand(a, b) { return a + Math.random() * (b - a); }

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    if (!bgCanvas) {
        bgCanvas = document.createElement('canvas');
        bgCtx = bgCanvas.getContext('2d');
        gameLayer.insertBefore(bgCanvas, gameLayer.firstChild);
        bgCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
    }
    bgCanvas.width = W;
    bgCanvas.height = H;
    basket.w = Math.min(70, W * 0.16);
    basket.h = 50;
}
window.addEventListener('resize', resize);
resize();

// ===== 绘制静态星空背景 =====
function drawBg() {
    bgCtx.fillStyle = '#0a0014';
    bgCtx.fillRect(0, 0, W, H);
    // 星星
    for (let i = 0; i < 100; i++) {
        bgCtx.globalAlpha = rand(0.2, 0.9);
        bgCtx.fillStyle = '#fff';
        bgCtx.beginPath();
        bgCtx.arc(rand(0, W), rand(0, H), rand(0.5, 2), 0, Math.PI * 2);
        bgCtx.fill();
    }
    bgCtx.globalAlpha = 1;
    // 光效
    const g1 = bgCtx.createRadialGradient(W * 0.2, H * 0.3, 0, W * 0.2, H * 0.3, 200);
    g1.addColorStop(0, 'rgba(255,107,157,0.05)');
    g1.addColorStop(1, 'transparent');
    bgCtx.fillStyle = g1;
    bgCtx.fillRect(0, 0, W, H);
    const g2 = bgCtx.createRadialGradient(W * 0.8, H * 0.7, 0, W * 0.8, H * 0.7, 180);
    g2.addColorStop(0, 'rgba(138,79,255,0.04)');
    g2.addColorStop(1, 'transparent');
    bgCtx.fillStyle = g2;
    bgCtx.fillRect(0, 0, W, H);
}

// ===== 掉落物生成 =====
function spawnItem() {
    const totalWeight = ITEM_TYPES.reduce((s, t) => s + t.weight, 0);
    let r = rand(0, totalWeight);
    let chosen = ITEM_TYPES[0];
    for (const t of ITEM_TYPES) {
        r -= t.weight;
        if (r <= 0) { chosen = t; break; }
    }

    const size = chosen.type === 'star' ? 34 : 28;
    const item = {
        x: rand(size, W - size),
        y: -size - 10,
        size: size,
        speed: rand(1.5, 3) * difficulty + rand(0, 0.5),
        wobble: rand(0, Math.PI * 2),
        wobbleSpeed: rand(0.02, 0.05),
        wobbleAmp: rand(0.3, 1.0),
        ...chosen,
        el: null,
        alive: true,
    };

    // 创建 DOM 元素
    const el = document.createElement('div');
    el.className = 'fall-item ' + chosen.cls;
    el.textContent = chosen.emoji;
    el.style.left = '0px';
    el.style.top = '0px';
    gameLayer.appendChild(el);
    item.el = el;

    items.push(item);
}

// ===== 触摸控制 - 手指直接控制篮子位置 =====
let touchActive = false;
let touchOffsetX = 0;
let touchOffsetY = 0;

function handleTouch(x, y) {
    // 篮子跟随手指，偏移一点让手指不挡住
    basket.x = x + touchOffsetX;
    basket.y = y + touchOffsetY - 60;
    // 边界限制
    basket.x = Math.max(basket.w / 2 + 5, Math.min(W - basket.w / 2 - 5, basket.x));
    basket.y = Math.max(H * 0.3, Math.min(H - 60, basket.y));
}

document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchActive = true;
    const t = e.touches[0];
    touchOffsetX = basket.x - t.clientX;
    touchOffsetY = basket.y - t.clientY + 60;
    handleTouch(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchActive || !gameRunning || paused) return;
    const t = e.touches[0];
    handleTouch(t.clientX, t.clientY);
}, { passive: false });

document.addEventListener('touchend', (e) => {
    e.preventDefault();
    touchActive = false;
}, { passive: false });

// 鼠标支持（PC 测试用）
document.addEventListener('mousemove', (e) => {
    if (!gameRunning || paused) return;
    handleTouch(e.clientX, e.clientY);
});

// ===== 碰撞检测 =====
function checkCollision(item) {
    const dx = item.x - basket.x;
    const dy = item.y - basket.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < (basket.w / 2 + item.size / 2) * 0.7;
}

// ===== 粒子效果 =====
function spawnParticles(x, y, emoji, count) {
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emoji;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(30, 80);
        p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(angle) * dist - 30 + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

// ===== 分数弹出 =====
function showScorePop(x, y, text, color) {
    const p = document.createElement('div');
    p.className = 'score-pop';
    p.textContent = text;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.color = color || '#ffd166';
    p.style.textShadow = '0 0 8px ' + (color || 'rgba(255,209,102,0.6)');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
}

// ===== 连击闪字 =====
function showCombo(text) {
    const el = document.getElementById('comboFlash');
    el.textContent = text;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
}

// ===== HUD 更新 =====
function updateHUD() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('comboVal').textContent = combo;
    document.getElementById('levelVal').textContent = level;
    document.getElementById('livesVal').textContent = '❤️'.repeat(Math.max(0, lives));
}

// ===== 更新篮子 DOM 位置 =====
function updateBasketDOM() {
    basketEl.style.transform = `translate(${basket.x - basket.w / 2}px, ${basket.y - basket.h / 2}px)`;

    // combo 光环
    if (combo >= 5) {
        const ringSize = basket.w + 20 + Math.min(combo, 30);
        comboRingEl.style.width = ringSize + 'px';
        comboRingEl.style.height = ringSize + 'px';
        comboRingEl.style.transform = `translate(${basket.x - ringSize / 2}px, ${basket.y - ringSize / 2}px)`;
        comboRingEl.style.borderColor = combo >= 20 ? 'rgba(255,209,102,0.2)' : 'rgba(255,107,157,0.15)';
        comboRingEl.style.opacity = '1';
    } else {
        comboRingEl.style.opacity = '0';
    }
}

// ===== 游戏主循环 =====
let lastTime = 0;

function gameLoop(timestamp) {
    if (!gameRunning || paused) return;
    animId = requestAnimationFrame(gameLoop);

    if (!lastTime) lastTime = timestamp;
    const dt = Math.min(timestamp - lastTime, 33); // cap at ~30fps min
    lastTime = timestamp;
    const dtFactor = dt / 16.67; // normalize to 60fps

    // 屏幕震动
    if (shakeAmount > 0) {
        shakeX = rand(-shakeAmount, shakeAmount);
        shakeY = rand(-shakeAmount, shakeAmount);
        shakeAmount *= 0.92;
        if (shakeAmount < 0.3) { shakeAmount = 0; shakeX = 0; shakeY = 0; }
        gameLayer.style.transform = `translate(${shakeX}px, ${shakeY}px)`;
    } else {
        gameLayer.style.transform = '';
    }

    // 更新篮子 DOM
    updateBasketDOM();

    // 生成掉落物
    spawnTimer += dtFactor;
    const spawnInterval = Math.max(25, 65 - level * 4);
    if (spawnTimer >= spawnInterval) {
        spawnItem();
        spawnTimer = 0;
    }

    // 更新掉落物
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        if (!item.alive) continue;

        item.y += item.speed * dtFactor;
        item.wobble += item.wobbleSpeed * dtFactor;
        item.x += Math.sin(item.wobble) * item.wobbleAmp;

        // 更新 DOM 位置
        item.el.style.transform = `translate(${item.x - item.size / 2}px, ${item.y - item.size / 2}px)`;

        // 超出屏幕
        if (item.y > H + 40) {
            if (item.type !== 'bomb') {
                totalMissed++;
                combo = 0;
                updateHUD();
            }
            item.el.remove();
            items.splice(i, 1);
            continue;
        }

        // 碰撞检测
        if (checkCollision(item)) {
            item.alive = false;
            item.el.remove();
            items.splice(i, 1);

            if (item.type === 'bomb') {
                lives--;
                combo = 0;
                shakeAmount = 15;
                totalBombs++;
                spawnParticles(item.x, item.y, '💥', 6);
                showCombo('💥');
                showScorePop(item.x, item.y - 20, '-1 ❤️', '#ff4444');
            } else {
                const comboMult = Math.min(1 + combo * 0.1, 3);
                const pts = Math.round(item.points * comboMult);
                score += pts;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalCaught++;

                spawnParticles(item.x, item.y, item.emoji, 4);
                showScorePop(item.x, item.y - 20, '+' + pts, item.type === 'star' ? '#ffd166' : '#ff6b9d');

                if (combo === 5) showCombo('🔥 连击x5!');
                else if (combo === 10) showCombo('🔥🔥 连击x10!');
                else if (combo === 20) showCombo('💥💥💥 连击x20!');
                else if (combo >= 30 && combo % 10 === 0) showCombo('🌟 传奇连击x' + combo + '!');
            }
            updateHUD();

            if (lives <= 0) {
                endGame();
                return;
            }
        }
    }

    // 等级提升
    levelTimer += dtFactor;
    if (levelTimer >= 600) {
        level++;
        difficulty = 1 + (level - 1) * 0.15;
        levelTimer = 0;
        showCombo('⬆️ 等级 ' + level);
        updateHUD();
    }
}

// ===== 开始游戏 =====
function startGame() {
    document.getElementById('startScreen').classList.add('hide');
    gameLayer.classList.add('show');
    document.getElementById('hud').classList.add('show');
    document.getElementById('pauseBtn').classList.add('show');

    score = 0; combo = 0; maxCombo = 0; lives = 3;
    level = 1; totalCaught = 0; totalMissed = 0; totalBombs = 0;
    spawnTimer = 0; levelTimer = 0; difficulty = 1;
    shakeAmount = 0; shakeX = 0; shakeY = 0; lastTime = 0;

    // 清除旧的掉落物 DOM
    document.querySelectorAll('.fall-item').forEach(el => el.remove());
    items = [];

    resize();
    drawBg();

    basket.x = W / 2;
    basket.y = H - 100;
    updateBasketDOM();
    updateHUD();

    gameRunning = true;
    paused = false;
    animId = requestAnimationFrame(gameLoop);
}

// ===== 暂停 =====
function togglePause() {
    if (!gameRunning) return;
    paused = !paused;
    document.getElementById('pauseOverlay').classList.toggle('show', paused);
    document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
    if (!paused) {
        lastTime = 0;
        animId = requestAnimationFrame(gameLoop);
    }
}

// ===== 结束 =====
function endGame() {
    gameRunning = false;
    if (animId) cancelAnimationFrame(animId);

    gameLayer.classList.remove('show');
    document.getElementById('hud').classList.remove('show');
    document.getElementById('pauseBtn').classList.remove('show');

    document.getElementById('finalScore').textContent = score;

    let title = '游戏结束';
    let color = '#ff6b9d';
    if (score >= 2000) { title = '🌟 传奇！'; color = '#ffd166'; }
    else if (score >= 1000) { title = '🔥 太厉害了！'; color = '#ffa8c5'; }
    else if (score >= 500) { title = '💗 不错哦！'; color = '#ff6b9d'; }
    else { title = '💪 继续加油！'; color = '#c9a0dc'; }

    document.getElementById('endTitle').textContent = title;
    document.getElementById('endTitle').style.color = color;
    document.getElementById('endStats').innerHTML =
        `收集 <span>${totalCaught}</span> 颗爱心<br>` +
        `最高连击 <span>x${maxCombo}</span><br>` +
        `达到等级 <span>${level}</span><br>` +
        `踩中炸弹 <span>${totalBombs}</span> 次`;

    document.getElementById('endScreen').classList.add('show');
}

// ===== 重新开始 =====
function restartGame() {
    document.getElementById('endScreen').classList.remove('show');
    startGame();
}

// ===== 退出 =====
function quitGame() {
    gameRunning = false;
    paused = false;
    if (animId) cancelAnimationFrame(animId);
    document.querySelectorAll('.fall-item').forEach(el => el.remove());
    items = [];
    gameLayer.classList.remove('show');
    document.getElementById('hud').classList.remove('show');
    document.getElementById('pauseBtn').classList.remove('show');
    document.getElementById('pauseOverlay').classList.remove('show');
    document.getElementById('endScreen').classList.remove('show');
    document.getElementById('startScreen').classList.remove('hide');
}

// ===== 键盘支持 =====
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') togglePause();
    if (e.key === 'ArrowLeft') { basket.x -= 30; }
    if (e.key === 'ArrowRight') { basket.x += 30; }
    if (e.key === 'ArrowUp') { basket.y -= 20; }
    if (e.key === 'ArrowDown') { basket.y += 20; }
});
</script>
